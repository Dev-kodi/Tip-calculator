<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-card">
        <header>
            <h1>Tip Guide</h1>
            <p class="subtitle">Standard 5% Gratuity</p>
        </header>

        <form id="tip-form">
            <label for="bill-amount">Total Bill ($)</label>
            <input type="number" id="bill-amount" placeholder="0.00" step="0.01" required>
            
            <button type="submit" id="calc-btn">Calculate Tip</button>
        </form>

        <div id="result-area" class="hidden">
            <p>Your 5% tip is:</p>
            <h2 id="tip-display">$0.00</h2>
        </div>
    </div>

    <script>
        const tipForm = document.getElementById('tip-form');
        const billInput = document.getElementById('bill-amount');
        const resultArea = document.getElementById('result-area');
        const tipDisplay = document.getElementById('tip-display');

        tipForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // The Math: Bill * 0.05
            const bill = parseFloat(billInput.value);
            const tip = bill * 0.05;

            // Update UI
            tipDisplay.innerText = `$${tip.toFixed(2)}`;
            resultArea.classList.remove('hidden');
            resultArea.classList.add('show');
        });
    </script>
</body>
</html>
